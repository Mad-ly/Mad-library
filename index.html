<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>La Mia Libreria</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjM2IiBmaWxsPSIjMUYyRTI0Ii8+PHRleHQgeD0iOTAiIHk9IjExMCIgZm9udC1zaXplPSI4MCIgdGV4dC1hbmNob3I9Im1pZGRsZSI+8J+TmjwvdGV4dD48L3N2Zz4=">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La Mia Libreria">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: #1F2E24;
    font-family: Georgia, 'Times New Roman', serif;
    color: #3B2F2A;
    padding: 32px 16px 80px;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 20px; position: relative; }
  .header .title-row { display: inline-flex; align-items: center; gap: 10px; color: #F0E6D2; }
  .header h1 { font-size: 30px; margin: 0; font-weight: 400; letter-spacing: 0.02em; }
  .header p { color: #B0A48F; font-family: 'Courier New', monospace; font-size: 12.5px;
    letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; }
  .account-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 24px;
    font-family: 'Courier New', monospace; font-size: 11.5px; color: #8AA08C; }
  .logout-btn { background: none; border: 1px solid #4A5C4E; color: #B0A48F; border-radius: 14px;
    padding: 3px 10px; font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-box { flex: 1 1 220px; display: flex; align-items: center; background: #F0E6D2;
    border-radius: 6px; padding: 8px 12px; gap: 8px; }
  .search-box input { border: none; outline: none; background: transparent;
    font-family: 'Courier New', monospace; font-size: 13.5px; width: 100%; color: #3B2F2A; }
  .btn-add { display: flex; align-items: center; gap: 6px; background: #B8935F; color: #1F2E24;
    border: none; border-radius: 6px; padding: 8px 16px; font-family: 'Courier New', monospace;
    font-size: 13px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; }
  .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn { background: transparent; color: #B0A48F; border: 1px solid #4A5C4E;
    border-radius: 20px; padding: 5px 14px; font-family: 'Courier New', monospace; font-size: 12px;
    cursor: pointer; }
  .filter-btn.active { background: #F0E6D2; color: #1F2E24; }
  .empty { text-align: center; color: #8A9A8C; padding: 60px 20px; font-family: 'Courier New', monospace;
    font-size: 13px; }
  .card { position: relative; background: #F0E6D2; border-radius: 4px; padding: 18px 20px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.25); border-left: 4px solid #B8935F; display: flex; gap: 14px;
    margin-bottom: 14px; }
  .cover { width: 64px; height: 93px; flex-shrink: 0; border-radius: 3px; overflow: hidden;
    background: #D8CBA8; display: flex; align-items: center; justify-content: center;
    box-shadow: 1px 2px 4px rgba(0,0,0,0.25); font-size: 24px; }
  .cover img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { flex: 1; min-width: 0; }
  .stamp { position: absolute; top: 14px; right: 14px; border-radius: 4px; padding: 2px 8px;
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    font-family: 'Courier New', monospace; transform: rotate(-3deg); opacity: 0.85;
    background: rgba(240,230,210,0.85); border: 1.5px solid; }
  .card h3 { margin: 0 90px 4px 0; font-size: 19px; color: #2A2118; }
  .card .meta { margin: 0 0 10px 0; font-family: 'Courier New', monospace; font-size: 12.5px; color: #6B5A45; }
  .card .notes { font-size: 13.5px; color: #4A3F30; margin: 0 0 10px 0; line-height: 1.5; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; }
  .stars { display: flex; gap: 2px; cursor: pointer; }
  .stars span { font-size: 17px; color: #B0A48F; }
  .stars span.filled { color: #B8935F; }
  .delete-btn { background: none; border: none; color: #A45A4A; cursor: pointer; font-size: 16px; padding: 4px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none;
    align-items: center; justify-content: center; padding: 16px; z-index: 50; }
  .modal-overlay.open { display: flex; }
  .modal { background: #F0E6D2; border-radius: 8px; padding: 24px; width: 100%; max-width: 420px;
    max-height: 85vh; overflow-y: auto; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-head h3 { margin: 0; font-size: 20px; color: #2A2118; }
  .modal-head button { background: none; border: none; cursor: pointer; font-size: 20px; color: #6B5A45; }
  label { display: block; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.06em;
    text-transform: uppercase; color: #8A7A5F; margin-bottom: 4px; }
  input[type=text], input[type=email], input[type=date], textarea {
    width: 100%; border: 1px solid #C9B896; border-radius: 6px; padding: 8px 10px;
    font-family: Georgia, serif; font-size: 14px; margin-bottom: 12px; background: #FBF7EE; color: #2A2118; }
  textarea { min-height: 70px; resize: vertical; }
  .status-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .status-btn { flex: 1; padding: 6px 4px; border-radius: 6px; background: transparent;
    font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; }
  .cover-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .choose-photo-btn { display: flex; align-items: center; gap: 6px; background: #FBF7EE;
    border: 1px solid #C9B896; border-radius: 6px; padding: 7px 12px; font-family: 'Courier New', monospace;
    font-size: 12px; cursor: pointer; color: #6B5A45; }
  .save-btn { width: 100%; margin-top: 8px; background: #5C7A5C; color: #F0E6D2; border: none;
    border-radius: 6px; padding: 10px 0; font-family: 'Courier New', monospace; font-size: 13.5px;
    font-weight: 700; cursor: pointer; }
  .error-box { background: #5C2E2E; color: #F0E6D2; padding: 8px 14px; border-radius: 6px; font-size: 13px;
    margin-bottom: 16px; font-family: 'Courier New', monospace; }
  .info-box { background: #33463A; color: #DCE8DE; padding: 8px 14px; border-radius: 6px; font-size: 13px;
    margin-bottom: 16px; font-family: 'Courier New', monospace; }

  /* Login screen */
  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: #F0E6D2; border-radius: 8px; padding: 32px 24px; max-width: 340px; width: 100%; }
  .login-card h2 { margin: 0 0 6px 0; font-size: 22px; color: #2A2118; text-align: center; }
  .login-card p { font-family: 'Courier New', monospace; font-size: 12px; color: #8A7A5F; text-align: center;
    margin: 0 0 20px 0; }
  .login-btn { width: 100%; background: #5C7A5C; color: #F0E6D2; border: none; border-radius: 6px;
    padding: 10px 0; font-family: 'Courier New', monospace; font-size: 13.5px; font-weight: 700; cursor: pointer; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div style="text-align:center; margin-bottom:14px; color:#3B2F2A; font-size:26px;">📚</div>
    <h2>La Mia Libreria</h2>
    <p>Accedi con la tua email per sincronizzare i libri su tutti i dispositivi</p>
    <div id="loginError"></div>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="tu@esempio.com">
    <button class="login-btn" id="sendLinkBtn">Invia link di accesso</button>
    <div id="loginMsg" style="margin-top:12px;"></div>
  </div>
</div>

<div id="appScreen" class="hidden">
  <div class="wrap">
    <div class="header">
      <div class="title-row"><span style="font-size:24px">📚</span><h1>La Mia Libreria</h1></div>
      <p id="subtitle">Schedario personale — 0 volumi</p>
    </div>
    <div class="account-row">
      <span id="userEmail"></span>
      <button class="logout-btn" id="logoutBtn">Esci</button>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <span>🔍</span>
        <input id="searchInput" placeholder="Cerca per titolo o autore...">
      </div>
      <button class="btn-add" id="openAddBtn">+ Aggiungi</button>
    </div>

    <div class="filters" id="filters"></div>
    <div id="errorBox"></div>
    <div id="bookList"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3>Nuovo libro</h3>
      <button id="closeModalBtn">✕</button>
    </div>

    <label>Copertina</label>
    <div class="cover-row">
      <div class="cover" id="coverPreview">📖</div>
      <button class="choose-photo-btn" id="choosePhotoBtn">🖼 Scegli foto</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <button id="clearCoverBtn" style="display:none;background:none;border:none;color:#A45A4A;cursor:pointer;">✕</button>
    </div>

    <label>Titolo *</label>
    <input type="text" id="titleInput" placeholder="Il nome del vento">

    <label>Autore</label>
    <input type="text" id="authorInput" placeholder="Patrick Rothfuss">

    <label>Stato</label>
    <div class="status-row" id="statusRow"></div>

    <div id="lettoFields">
      <label>Data di fine lettura</label>
      <input type="date" id="finishedInput">
      <label>Valutazione</label>
      <div class="stars" id="ratingStars" style="margin-bottom:12px;"></div>
    </div>

    <label>Note</label>
    <textarea id="notesInput" placeholder="Pensieri, citazioni, impressioni..."></textarea>

    <button class="save-btn" id="saveBtn">✓ Salva libro</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://litufmnljtgxdxwzdepo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_GSygIZY4K16AucsMQFnRsQ_2X8igajA';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STATUSES = {
  letto: { label: 'Letto', color: '#5C7A5C' },
  leggendo: { label: 'In lettura', color: '#B8935F' },
  daLeggere: { label: 'Da leggere', color: '#8A6E8A' },
};

let books = [];
let query = '';
let filter = 'tutti';
let form = { title: '', author: '', status: 'letto', rating: 0, finished: '', notes: '', cover: '' };
let currentUser = null;

// --- AUTH ---
document.getElementById('sendLinkBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const errBox = document.getElementById('loginError');
  const msgBox = document.getElementById('loginMsg');
  errBox.innerHTML = ''; msgBox.innerHTML = '';
  if (!email) { errBox.innerHTML = '<div class="error-box">Inserisci un\'email.</div>'; return; }
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });
  if (error) {
    errBox.innerHTML = `<div class="error-box">${error.message}</div>`;
  } else {
    msgBox.innerHTML = '<div class="info-box">Ti abbiamo mandato un link via email. Aprilo su questo dispositivo per accedere.</div>';
  }
};

document.getElementById('logoutBtn').onclick = async () => {
  await sb.auth.signOut();
  location.reload();
};

async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    onLoggedIn(session);
  }
  sb.auth.onAuthStateChange((event, session) => {
    if (session) onLoggedIn(session);
  });
}

async function onLoggedIn(session) {
  currentUser = session.user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  document.getElementById('userEmail').textContent = currentUser.email;
  await loadBooks();
  renderAll();
  resetForm();
}

// --- DATA ---
async function loadBooks() {
  const { data, error } = await sb.from('books').select('*').order('created_at', { ascending: false });
  if (error) { showError('Errore nel caricamento: ' + error.message); return; }
  books = data.map(b => ({
    id: b.id, title: b.title, author: b.author, status: b.status,
    rating: b.rating || 0, finished: b.finished || '', notes: b.notes || '', cover: b.cover || ''
  }));
}

function showError(msg) {
  document.getElementById('errorBox').innerHTML = msg ? `<div class="error-box">${msg}</div>` : '';
}

async function addBookRemote(book) {
  const { data, error } = await sb.from('books').insert({
    user_id: currentUser.id,
    title: book.title, author: book.author, status: book.status,
    rating: book.rating, finished: book.finished || null, notes: book.notes, cover: book.cover
  }).select().single();
  if (error) { showError('Errore nel salvataggio: ' + error.message); return null; }
  return data;
}

async function updateRatingRemote(id, rating) {
  const { error } = await sb.from('books').update({ rating }).eq('id', id);
  if (error) showError('Errore: ' + error.message);
}

async function deleteBookRemote(id) {
  const { error } = await sb.from('books').delete().eq('id', id);
  if (error) showError('Errore: ' + error.message);
}

// --- RENDER ---
function renderFilters() {
  const counts = { tutti: books.length, letto: 0, leggendo: 0, daLeggere: 0 };
  books.forEach(b => counts[b.status] = (counts[b.status] || 0) + 1);
  const defs = [
    { key: 'tutti', label: 'Tutti' },
    { key: 'letto', label: 'Letti' },
    { key: 'leggendo', label: 'In lettura' },
    { key: 'daLeggere', label: 'Da leggere' },
  ];
  document.getElementById('filters').innerHTML = defs.map(f =>
    `<button class="filter-btn ${filter === f.key ? 'active' : ''}" data-filter="${f.key}">${f.label} (${counts[f.key] || 0})</button>`
  ).join('');
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => { filter = btn.dataset.filter; renderAll(); };
  });
}

function renderList() {
  const q = query.trim().toLowerCase();
  const filtered = books.filter(b => {
    const matchesFilter = filter === 'tutti' || b.status === filter;
    const matchesQuery = !q || b.title.toLowerCase().includes(q) || (b.author || '').toLowerCase().includes(q);
    return matchesFilter && matchesQuery;
  });

  const list = document.getElementById('bookList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">${books.length === 0 ? 'Lo schedario è vuoto. Aggiungi il primo libro.' : 'Nessun libro corrisponde alla ricerca.'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(b => {
    const s = STATUSES[b.status];
    const coverHtml = b.cover ? `<img src="${b.cover}">` : '📖';
    const starsHtml = [1,2,3,4,5].map(n =>
      `<span class="${n <= b.rating ? 'filled' : ''}" data-id="${b.id}" data-n="${n}">★</span>`
    ).join('');
    return `
      <div class="card">
        <div class="cover">${coverHtml}</div>
        <div class="card-body">
          <div class="stamp" style="color:${s.color};border-color:${s.color}">${s.label}</div>
          <h3>${escapeHtml(b.title)}</h3>
          <p class="meta">${escapeHtml(b.author || 'Autore sconosciuto')}${b.finished ? ' · finito il ' + b.finished : ''}</p>
          ${b.notes ? `<p class="notes">${escapeHtml(b.notes)}</p>` : ''}
          <div class="card-footer">
            <div class="stars book-stars">${starsHtml}</div>
            <button class="delete-btn" data-del="${b.id}">🗑</button>
          </div>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.book-stars span').forEach(el => {
    el.onclick = async () => {
      const id = el.dataset.id, n = parseInt(el.dataset.n);
      books = books.map(b => b.id === id ? { ...b, rating: n } : b);
      renderList();
      await updateRatingRemote(id, n);
    };
  });
  list.querySelectorAll('[data-del]').forEach(el => {
    el.onclick = async () => {
      const id = el.dataset.del;
      books = books.filter(b => b.id !== id);
      renderAll();
      await deleteBookRemote(id);
    };
  });
}

function renderSubtitle() {
  document.getElementById('subtitle').textContent =
    `Schedario personale — ${books.length} ${books.length === 1 ? 'volume' : 'volumi'}`;
}

function renderAll() {
  renderFilters(); renderList(); renderSubtitle();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Modal / form ---
const modalOverlay = document.getElementById('modalOverlay');
function resetForm() {
  form = { title: '', author: '', status: 'letto', rating: 0, finished: '', notes: '', cover: '' };
  document.getElementById('titleInput').value = '';
  document.getElementById('authorInput').value = '';
  document.getElementById('finishedInput').value = '';
  document.getElementById('notesInput').value = '';
  document.getElementById('coverPreview').innerHTML = '📖';
  document.getElementById('clearCoverBtn').style.display = 'none';
  renderStatusRow(); renderRatingStars(); toggleLettoFields();
}

function renderStatusRow() {
  document.getElementById('statusRow').innerHTML = Object.entries(STATUSES).map(([key, s]) => `
    <button class="status-btn" data-status="${key}" style="border:1px solid ${s.color};
      background:${form.status === key ? s.color : 'transparent'};
      color:${form.status === key ? '#F0E6D2' : s.color};">${s.label}</button>
  `).join('');
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.onclick = () => { form.status = btn.dataset.status; renderStatusRow(); toggleLettoFields(); };
  });
}

function renderRatingStars() {
  document.getElementById('ratingStars').innerHTML = [1,2,3,4,5].map(n =>
    `<span class="${n <= form.rating ? 'filled' : ''}" data-n="${n}" style="font-size:22px;cursor:pointer;">★</span>`
  ).join('');
  document.querySelectorAll('#ratingStars span').forEach(el => {
    el.onclick = () => { form.rating = parseInt(el.dataset.n); renderRatingStars(); };
  });
}

function toggleLettoFields() {
  document.getElementById('lettoFields').style.display = form.status === 'letto' ? 'block' : 'none';
}

document.getElementById('openAddBtn').onclick = () => { resetForm(); showError(''); modalOverlay.classList.add('open'); };
document.getElementById('closeModalBtn').onclick = () => modalOverlay.classList.remove('open');
modalOverlay.onclick = (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); };

document.getElementById('searchInput').oninput = (e) => { query = e.target.value; renderList(); };

document.getElementById('choosePhotoBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('clearCoverBtn').onclick = () => {
  form.cover = '';
  document.getElementById('coverPreview').innerHTML = '📖';
  document.getElementById('clearCoverBtn').style.display = 'none';
};

document.getElementById('fileInput').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const maxWidth = 240;
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      form.cover = canvas.toDataURL('image/jpeg', 0.75);
      document.getElementById('coverPreview').innerHTML = `<img src="${form.cover}">`;
      document.getElementById('clearCoverBtn').style.display = 'inline-block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};

document.getElementById('saveBtn').onclick = async () => {
  form.title = document.getElementById('titleInput').value;
  form.author = document.getElementById('authorInput').value;
  form.finished = document.getElementById('finishedInput').value;
  form.notes = document.getElementById('notesInput').value;

  if (!form.title.trim()) { showError('Il titolo è obbligatorio.'); return; }

  const saved = await addBookRemote(form);
  if (!saved) return;
  books = [{
    id: saved.id, title: saved.title, author: saved.author, status: saved.status,
    rating: saved.rating || 0, finished: saved.finished || '', notes: saved.notes || '', cover: saved.cover || ''
  }, ...books];
  showError('');
  modalOverlay.classList.remove('open');
  renderAll();
};

initAuth();
</script>
</body>
</html>
