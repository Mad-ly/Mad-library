<script>
const SUPABASE_URL = 'https://hjlvcajgtbatedraudgx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yszDqbBc-gIlNmaUdJiXzQ_R3ZcbpHi';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STATUSES = {
  letto: { label: 'Letto', color: '#8C1F45' },
  leggendo: { label: 'In lettura', color: '#C2467B' },
  daLeggere: { label: 'Da leggere', color: '#8C5B82' },
};

let books = [];
let query = '';
let filter = 'tutti';
let authorFilter = '';
let form = { title: '', author: '', genre: '', status: 'letto', rating: 0, finished: '', notes: '', cover: '', pages: [] };
let currentUser = null;

// --- Lightbox ---
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox').onclick = () => document.getElementById('lightbox').classList.remove('open');

// --- Image resize helper ---
function resizeFile(file, maxWidth = 240, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// --- AUTH ---
document.getElementById('sendLinkBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const errBox = document.getElementById('loginError');
  const msgBox = document.getElementById('loginMsg');
  errBox.innerHTML = ''; msgBox.innerHTML = '';
  if (!email) { errBox.innerHTML = '<div class="error-box">Inserisci un\'email.</div>'; return; }
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });
  if (error) {
    errBox.innerHTML = `<div class="error-box">${error.message}</div>`;
  } else {
    msgBox.innerHTML = '<div class="info-box">Ti abbiamo mandato un link via email. Aprilo su questo dispositivo per accedere.</div>';
  }
};

document.getElementById('logoutBtn').onclick = async () => {
  await sb.auth.signOut();
  location.reload();
};

async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    onLoggedIn(session);
  }
  sb.auth.onAuthStateChange((event, session) => {
    if (session) onLoggedIn(session);
  });
}

async function onLoggedIn(session) {
  currentUser = session.user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  document.getElementById('userEmail').textContent = currentUser.email;
  await loadBooks();
  renderAll();
  resetForm();
}

// --- DATA ---
async function loadBooks() {
  const { data, error } = await sb.from('books').select('*').order('title', { ascending: true });
  if (error) { showError('Errore nel caricamento: ' + error.message); return; }
  books = data.map(b => ({
    id: b.id, title: b.title, author: b.author, genre: b.genre || '', status: b.status,
    rating: b.rating || 0, finished: b.finished || '', notes: b.notes || '', cover: b.cover || '',
    pages: b.pages || []
  }));
}

function showError(msg) {
  document.getElementById('errorBox').innerHTML = msg ? `<div class="error-box">${msg}</div>` : '';
}

async function addBookRemote(book) {
  const { data, error } = await sb.from('books').insert({
    user_id: currentUser.id,
    title: book.title, author: book.author, genre: book.genre, status: book.status,
    rating: book.rating, finished: book.finished || null, notes: book.notes, cover: book.cover,
    pages: book.pages
  }).select().single();
  if (error) { showError('Errore nel salvataggio: ' + error.message); return null; }
  return data;
}

async function updateRatingRemote(id, rating) {
  const { error } = await sb.from('books').update({ rating }).eq('id', id);
  if (error) showError('Errore: ' + error.message);
}

async function deleteBookRemote(id) {
  const { error } = await sb.from('books').delete().eq('id', id);
  if (error) showError('Errore: ' + error.message);
}

// --- RENDER ---
function renderFilters() {
  const counts = { tutti: books.length, letto: 0, leggendo: 0, daLeggere: 0 };
  books.forEach(b => counts[b.status] = (counts[b.status] || 0) + 1);
  const defs = [
    { key: 'tutti', label: 'Tutti' },
    { key: 'letto', label: 'Letti' },
    { key: 'leggendo', label: 'In lettura' },
    { key: 'daLeggere', label: 'Da leggere' },
  ];
  document.getElementById('filters').innerHTML = defs.map(f =>
    `<button class="filter-btn ${filter === f.key ? 'active' : ''}" data-filter="${f.key}">${f.label} (${counts[f.key] || 0})</button>`
  ).join('');
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => { filter = btn.dataset.filter; renderAll(); };
  });
}

function renderAuthorSelect() {
  const sel = document.getElementById('authorSelect');
  const authors = [...new Set(books.map(b => (b.author || '').trim()).filter(Boolean))]
    .sort((a, b) => a.localeCompare(b, 'it'));
  const prevValue = authorFilter;
  sel.innerHTML = '<option value="">Tutti gli autori</option>' +
    authors.map(a => `<option value="${escapeAttr(a)}">${escapeHtml(a)}</option>`).join('');
  sel.value = authors.includes(prevValue) ? prevValue : '';
  authorFilter = sel.value;
}

function renderList() {
  const q = query.trim().toLowerCase();
  const filtered = books.filter(b => {
    const matchesFilter = filter === 'tutti' || b.status === filter;
    const matchesQuery = !q || b.title.toLowerCase().includes(q);
    const matchesAuthor = !authorFilter || b.author === authorFilter;
    return matchesFilter && matchesQuery && matchesAuthor;
  }).sort((a, b) => a.title.localeCompare(b.title, 'it', { sensitivity: 'base' }));

  const list = document.getElementById('bookList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">${books.length === 0 ? 'Lo schedario è vuoto. Aggiungi il primo libro.' : 'Nessun libro corrisponde alla ricerca.'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(b => {
    const s = STATUSES[b.status];
    const coverHtml = b.cover ? `<img src="${b.cover}">` : '📖';
    const starsHtml = [1,2,3,4,5].map(n =>
      `<span class="${n <= b.rating ? 'filled' : ''}" data-id="${b.id}" data-n="${n}">★</span>`
    ).join('');
    const pagesHtml = (b.pages && b.pages.length) ? `
      <div class="pages-row">
        ${b.pages.map((p, i) => `<div class="page-thumb" data-src="${escapeAttr(p)}"><img src="${p}"></div>`).join('')}
      </div>` : '';
    return `
      <div class="card">
        <div class="cover" data-cover="${b.cover ? escapeAttr(b.cover) : ''}">${coverHtml}</div>
        <div class="card-body">
          <div class="stamp" style="color:${s.color};border-color:${s.color}">${s.label}</div>
          <h3>${escapeHtml(b.title)}</h3>
          <p class="meta">${escapeHtml(b.author || 'Autore sconosciuto')}${b.finished ? ' · finito il ' + b.finished : ''}</p>
          ${b.genre ? `<span class="genre-tag">${escapeHtml(b.genre)}</span>` : ''}
          ${b.notes ? `<p class="notes">${escapeHtml(b.notes)}</p>` : ''}
          ${pagesHtml}
          <div class="card-footer">
            <div class="stars book-stars">${starsHtml}</div>
            <button class="delete-btn" data-del="${b.id}">🗑</button>
          </div>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.book-stars span').forEach(el => {
    el.onclick = async () => {
      const id = el.dataset.id, n = parseInt(el.dataset.n);
      books = books.map(b => b.id === id ? { ...b, rating: n } : b);
      renderList();
      await updateRatingRemote(id, n);
    };
  });
  list.querySelectorAll('[data-del]').forEach(el => {
    el.onclick = async () => {
      const id = el.dataset.del;
      books = books.filter(b => b.id !== id);
      renderAll();
      await deleteBookRemote(id);
    };
  });
  list.querySelectorAll('.cover[data-cover]').forEach(el => {
    if (el.dataset.cover) el.onclick = () => openLightbox(el.dataset.cover);
  });
  list.querySelectorAll('.page-thumb').forEach(el => {
    el.onclick = () => openLightbox(el.dataset.src);
  });
}

function renderSubtitle() {
  document.getElementById('subtitle').textContent =
    `Schedario personale — ${books.length} ${books.length === 1 ? 'volume' : 'volumi'}`;
}

function renderAll() {
  renderFilters(); renderAuthorSelect(); renderList(); renderSubtitle();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return String(str).replace(/"/g, '&quot;');
}

// --- Modal / form ---
const modalOverlay = document.getElementById('modalOverlay');
function resetForm() {
  form = { title: '', author: '', genre: '', status: 'letto', rating: 0, finished: '', notes: '', cover: '', pages: [] };
  document.getElementById('titleInput').value = '';
  document.getElementById('authorInput').value = '';
  document.getElementById('genreInput').value = '';
  document.getElementById('finishedInput').value = '';
  document.getElementById('notesInput').value = '';
  document.getElementById('coverPreview').innerHTML = '📖';
  document.getElementById('clearCoverBtn').style.display = 'none';
  renderStatusRow(); renderRatingStars(); toggleLettoFields(); renderPagesEdit();
}

function renderStatusRow() {
  document.getElementById('statusRow').innerHTML = Object.entries(STATUSES).map(([key, s]) => `
    <button class="status-btn" data-status="${key}" style="border:1px solid ${s.color};
      background:${form.status === key ? s.color : 'transparent'};
      color:${form.status === key ? '#F7E1E8' : s.color};">${s.label}</button>
  `).join('');
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.onclick = () => { form.status = btn.dataset.status; renderStatusRow(); toggleLettoFields(); };
  });
}

function renderRatingStars() {
  document.getElementById('ratingStars').innerHTML = [1,2,3,4,5].map(n =>
    `<span class="${n <= form.rating ? 'filled' : ''}" data-n="${n}" style="font-size:22px;cursor:pointer;">★</span>`
  ).join('');
  document.querySelectorAll('#ratingStars span').forEach(el => {
    el.onclick = () => { form.rating = parseInt(el.dataset.n); renderRatingStars(); };
  });
}

function renderPagesEdit() {
  const row = document.getElementById('pagesEditRow');
  row.innerHTML = form.pages.map((p, i) => `
    <div class="page-edit-thumb">
      <img src="${p}">
      <button class="rm" data-idx="${i}">✕</button>
    </div>
  `).join('');
  row.querySelectorAll('.rm').forEach(btn => {
    btn.onclick = () => {
      form.pages.splice(parseInt(btn.dataset.idx), 1);
      renderPagesEdit();
    };
  });
}

function toggleLettoFields() {
  document.getElementById('lettoFields').style.display = form.status === 'letto' ? 'block' : 'none';
}

document.getElementById('openAddBtn').onclick = () => { resetForm(); showError(''); modalOverlay.classList.add('open'); };
document.getElementById('closeModalBtn').onclick = () => modalOverlay.classList.remove('open');
modalOverlay.onclick = (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); };

document.getElementById('searchInput').oninput = (e) => { query = e.target.value; renderList(); };
document.getElementById('authorSelect').onchange = (e) => { authorFilter = e.target.value; renderList(); };

document.getElementById('choosePhotoBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('clearCoverBtn').onclick = () => {
  form.cover = '';
  document.getElementById('coverPreview').innerHTML = '📖';
  document.getElementById('clearCoverBtn').style.display = 'none';
};

document.getElementById('fileInput').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    form.cover = await resizeFile(file, 240, 0.75);
    document.getElementById('coverPreview').innerHTML = `<img src="${form.cover}">`;
    document.getElementById('clearCoverBtn').style.display = 'inline-block';
  } catch (err) {
    showError('Non sono riuscito a leggere l\'immagine.');
  }
};

document.getElementById('addPagesBtn').onclick = () => document.getElementById('pagesInput').click();
document.getElementById('pagesInput').onchange = async (e) => {
  const files = Array.from(e.target.files || []);
  for (const file of files) {
    try {
      const dataUrl = await resizeFile(file, 320, 0.7);
      form.pages.push(dataUrl);
    } catch (err) {
      showError('Non sono riuscito a leggere una delle immagini.');
    }
  }
  renderPagesEdit();
  e.target.value = '';
};

document.getElementById('saveBtn').onclick = async () => {
  form.title = document.getElementById('titleInput').value;
  form.author = document.getElementById('authorInput').value;
  form.genre = document.getElementById('genreInput').value;
  form.finished = document.getElementById('finishedInput').value;
  form.notes = document.getElementById('notesInput').value;

  if (!form.title.trim()) { showError('Il titolo è obbligatorio.'); return; }

  const saved = await addBookRemote(form);
  if (!saved) return;
  books = [{
    id: saved.id, title: saved.title, author: saved.author, genre: saved.genre || '', status: saved.status,
    rating: saved.rating || 0, finished: saved.finished || '', notes: saved.notes || '', cover: saved.cover || '',
    pages: saved.pages || []
  }, ...books];
  showError('');
  modalOverlay.classList.remove('open');
  renderAll();
};

initAuth();
</script>
</body>
</html>
